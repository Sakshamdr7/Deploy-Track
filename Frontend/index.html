<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Track Dashboard</title>
    <style>
        :root {
            --bg: #f5f1e8;
            --panel: #fffaf2;
            --text: #1e1f24;
            --muted: #6b7280;
            --border: #dfd6c6;
            --accent: #1f6f5f;
            --accent-dark: #12483d;
            --success-bg: #dff6ea;
            --success-text: #166534;
            --failed-bg: #fde7e7;
            --failed-text: #991b1b;
            --shadow: 0 12px 30px rgba(30, 31, 36, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(31, 111, 95, 0.18), transparent 30%),
                linear-gradient(135deg, #efe6d6 0%, var(--bg) 45%, #f8f5ef 100%);
            min-height: 100vh;
        }

        .page {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto;
            padding: 40px 0 56px;
        }

        .hero {
            margin-bottom: 28px;
        }

        .eyebrow {
            display: inline-block;
            margin-bottom: 10px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(31, 111, 95, 0.1);
            color: var(--accent-dark);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 4vw, 3.5rem);
            line-height: 1;
        }

        .subtitle {
            max-width: 700px;
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;
        }

        .grid {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 24px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .form-card {
            padding: 22px;
            align-self: start;
            position: sticky;
            top: 20px;
        }

        .list-card {
            padding: 22px;
        }

        .section-title {
            margin: 0 0 8px;
            font-size: 1.2rem;
        }

        .section-copy {
            margin: 0 0 18px;
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        label {
            display: block;
            margin: 0 0 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input,
        select,
        textarea,
        button {
            width: 100%;
            font: inherit;
        }

        input,
        select,
        textarea {
            margin-bottom: 14px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: #fff;
            color: var(--text);
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        button {
            border: 0;
            border-radius: 14px;
            padding: 13px 16px;
            background: var(--accent);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.15s ease;
        }

        button:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 18px;
        }

        .meta {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .deployment-list {
            display: grid;
            gap: 14px;
        }

        .deployment-item {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: #fff;
        }

        .deployment-top {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .badge.success {
            background: var(--success-bg);
            color: var(--success-text);
        }

        .badge.failed {
            background: var(--failed-bg);
            color: var(--failed-text);
        }

        .deployment-time {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .deployment-message {
            margin: 0;
            line-height: 1.5;
        }

        .empty-state,
        .feedback {
            padding: 16px;
            border-radius: 14px;
            background: #fff;
            border: 1px dashed var(--border);
            color: var(--muted);
        }

        .feedback {
            margin-bottom: 14px;
        }

        .feedback.error {
            color: var(--failed-text);
            background: #fff5f5;
            border-style: solid;
        }

        .feedback.success {
            color: var(--success-text);
            background: #f1fbf5;
            border-style: solid;
        }

        @media (max-width: 860px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .form-card {
                position: static;
            }

            .toolbar,
            .deployment-top {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="hero">
            <span class="eyebrow">Semester Project</span>
            <h1>Deploy Track Dashboard</h1>
            <p class="subtitle">
                A simple DevOps monitoring dashboard for tracking CI/CD deployment results, timestamps, and release notes from one place.
            </p>
        </section>

        <section class="grid">
            <article class="card form-card">
                <h2 class="section-title">Log Deployment</h2>
                <p class="section-copy">
                    Use this form to simulate a pipeline event and push it into the backend API.
                </p>

                <div id="feedback" class="feedback" hidden></div>

                <form id="deployment-form">
                    <label for="status">Deployment Status</label>
                    <select id="status" name="status" required>
                        <option value="success">Success</option>
                        <option value="failed">Failed</option>
                    </select>

                    <label for="message">Deployment Message</label>
                    <textarea
                        id="message"
                        name="message"
                        placeholder="Example: Production build deployed from main branch"
                        required
                    ></textarea>

                    <button type="submit">Add Deployment Event</button>
                </form>
            </article>

            <article class="card list-card">
                <div class="toolbar">
                    <div>
                        <h2 class="section-title">Deployment History</h2>
                        <p class="meta" id="deployment-count">0 deployments logged</p>
                    </div>
                    <button id="refresh-button" type="button">Refresh List</button>
                </div>

                <div id="deployment-list" class="deployment-list"></div>
            </article>
        </section>
    </main>

    <script>
        const API_BASE_URL = "http://localhost:5000";
        const deploymentForm = document.getElementById("deployment-form");
        const deploymentList = document.getElementById("deployment-list");
        const deploymentCount = document.getElementById("deployment-count");
        const feedback = document.getElementById("feedback");
        const refreshButton = document.getElementById("refresh-button");

        function showFeedback(message, type) {
            feedback.hidden = false;
            feedback.textContent = message;
            feedback.className = `feedback ${type}`;
        }

        function clearFeedback() {
            feedback.hidden = true;
            feedback.textContent = "";
            feedback.className = "feedback";
        }

        function formatTime(value) {
            return new Date(value).toLocaleString();
        }

        function getBadgeClass(status) {
            return status === "success" ? "badge success" : "badge failed";
        }

        function renderDeployments(items) {
            deploymentCount.textContent = `${items.length} deployment${items.length === 1 ? "" : "s"} logged`;

            if (!items.length) {
                deploymentList.innerHTML = '<div class="empty-state">No deployments yet. Add your first event from the form.</div>';
                return;
            }

            deploymentList.innerHTML = items
                .map(
                    (item) => `
                        <article class="deployment-item">
                            <div class="deployment-top">
                                <span class="${getBadgeClass(item.status)}">${item.status}</span>
                                <span class="deployment-time">${formatTime(item.time)}</span>
                            </div>
                            <p class="deployment-message">${item.message}</p>
                        </article>
                    `
                )
                .join("");
        }

        async function loadDeployments() {
            try {
                const response = await fetch(`${API_BASE_URL}/deployments`);

                if (!response.ok) {
                    throw new Error("Unable to load deployments.");
                }

                const data = await response.json();
                renderDeployments(data.deployments || []);
            } catch (error) {
                showFeedback(error.message, "error");
            }
        }

        deploymentForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            clearFeedback();

            const formData = new FormData(deploymentForm);
            const payload = {
                status: formData.get("status"),
                message: formData.get("message").trim(),
            };

            try {
                const response = await fetch(`${API_BASE_URL}/deployments`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify(payload),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Unable to save deployment.");
                }

                deploymentForm.reset();
                showFeedback("Deployment event added successfully.", "success");
                await loadDeployments();
            } catch (error) {
                showFeedback(error.message, "error");
            }
        });

        refreshButton.addEventListener("click", loadDeployments);

        loadDeployments();
    </script>
</body>
</html>
